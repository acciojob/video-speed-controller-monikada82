<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Video Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="player">
    <video class="viewer" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

    <div class="controls">
      <!-- Play/Pause toggle -->
      <button class="player__button toggle" title="Toggle Play">►</button>

      <!-- Volume control -->
      <label>Volume</label>
      <input type="range" name="volume" class="player__slider" min="0" max="1" step="0.05" value="0.75">

      <!-- Playback speed control -->
      <label>Speed</label>
      <input type="range" name="playbackRate" class="player__slider" min="0.5" max="2" step="0.25" value="1">

      <!-- Skip buttons -->
      <button data-skip="-10">« 10s</button>
      <button data-skip="25">25s »</button>
    </div>

    <!-- Progress bar -->
    <div class="progress">
      <div class="progress__filled"></div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
